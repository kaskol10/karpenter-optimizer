version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - KUBECONFIG=/tmp/kubeconfig
      - KUBE_CONTEXT=${KUBE_CONTEXT:-}
    volumes:
      - ${HOME}/.kube/config:/tmp/kubeconfig:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=http://localhost:8080
    depends_on:
      - api
    restart: unless-stopped

